<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夢境圖書館 · 五天免費試用</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang TC", sans-serif;
    background: linear-gradient(180deg, #0d0e22 0%, #1a1040 100%);
    min-height: 100vh; color: #e8e8f0; line-height: 1.7;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 60px; }
  h1 { font-size: 22px; text-align: center; color: #c9b6ff; padding: 12px 0 4px; }
  .sub { text-align: center; font-size: 13px; color: #8a8ab0; margin-bottom: 18px; }

  .card {
    background: rgba(30,31,60,.85); border: 1px solid #3a3b6a;
    border-radius: 16px; padding: 18px; margin: 14px 0;
    backdrop-filter: blur(6px);
  }
  label { font-size: 13px; color: #9a9ac5; display: block; margin: 8px 0 5px; }
  input, textarea {
    width: 100%; padding: 12px; border-radius: 10px;
    border: 1px solid #45467a; background: #14152e; color: #fff; font-size: 16px;
  }
  textarea { min-height: 90px; resize: vertical; }
  button {
    width: 100%; padding: 14px; margin-top: 12px; border: none;
    border-radius: 10px; background: #7a5cff; color: #fff;
    font-size: 16px; font-weight: 700; letter-spacing: 1px;
  }
  button:active { background: #6446e0; }
  button.ghost { background: transparent; border: 1px solid #55568f; color: #b9b9e0; font-weight: 400; }
  button:disabled { opacity: .45; }

  .quota {
    display: flex; justify-content: space-around; text-align: center;
    font-size: 12px; color: #9a9ac5; margin-top: 10px;
  }
  .quota b { display: block; font-size: 18px; color: #ffd479; }

  /* 聊天區 */
  #chatBox {
    max-height: 46vh; overflow-y: auto; padding: 4px 2px;
    display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px;
  }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 15px; white-space: pre-wrap; }
  .me   { align-self: flex-end; background: #7a5cff; color: #fff; border-bottom-right-radius: 4px; }
  .luna { align-self: flex-start; background: #26274d; border: 1px solid #3c3d70; border-bottom-left-radius: 4px; }
  .sys  { align-self: center; font-size: 12px; color: #8a8ab0; }

  .row { display: flex; gap: 8px; }
  .row input { flex: 1; }
  .row button { width: auto; padding: 12px 18px; margin-top: 0; }

  .result {
    margin-top: 12px; padding: 14px; border-radius: 12px;
    background: #14152e; border: 1px solid #3c3d70;
    font-size: 15px; white-space: pre-wrap; display: none;
  }
  .err { color: #ff9a9a; }
  .hidden { display: none !important; }
  .line-cta {
    display: block; text-align: center; margin-top: 14px;
    color: #7dd87d; text-decoration: none; font-size: 14px;
    border: 1px solid #3f6b3f; border-radius: 10px; padding: 11px;
  }
  .loading { opacity: .6; pointer-events: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🌙 夢境圖書館</h1>
  <div class="sub">五天免費試用 · 每天 3 次 Luna 對話 + 1 次深度解夢</div>

  <!-- ========== 通行碼登入 ========== -->
  <div class="card" id="gateCard">
    <label>輸入通行碼開始體驗</label>
    <input id="codeInput" placeholder="例如 DREAM-7K9Q2" autocomplete="off" autocapitalize="characters">
    <button id="enterBtn">進入夢境圖書館</button>
    <div class="result" id="gateMsg"></div>
    <a class="line-cta" href="https://lin.ee/YewRM1L" target="_blank">
      還沒有通行碼？加 LINE 免費索取 →
    </a>
  </div>

  <!-- ========== 主功能區（驗證後顯示） ========== -->
  <div id="mainArea" class="hidden">

    <div class="card">
      <div class="quota">
        <div><b id="qChat">-</b>今日對話</div>
        <div><b id="qDream">-</b>今日解夢</div>
        <div><b id="qDays">-</b>試用剩餘天</div>
      </div>
    </div>

    <!-- Luna 對話 -->
    <div class="card">
      <label>💬 跟 Luna 聊聊你的夢</label>
      <div id="chatBox"></div>
      <div class="row">
        <input id="chatInput" placeholder="想說什麼呢…">
        <button id="sendBtn">送出</button>
      </div>
    </div>

    <!-- 深度解夢 -->
    <div class="card">
      <label>🔮 深度解夢（每天 1 次，請描述完整）</label>
      <textarea id="dreamInput" placeholder="把夢的場景、人物、感受盡量寫下來…"></textarea>
      <button id="dreamBtn">開始解夢</button>
      <div class="result" id="dreamResult"></div>
    </div>

    <button class="ghost" id="logoutBtn">換一組通行碼</button>
  </div>
</div>

<script>
const API = "https://dream-worker.rhtm9y855y.workers.dev";
const LS_KEY = "dream_trial_code";

let history = []; // Luna 對話歷史（本頁記憶）

const $ = (id) => document.getElementById(id);

function showQuota(r) {
  if (!r) return;
  $("qChat").textContent = r.chat;
  $("qDream").textContent = r.dream;
  $("qDays").textContent = r.trialDaysLeft;
}

function addMsg(text, cls) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.textContent = text;
  $("chatBox").appendChild(d);
  $("chatBox").scrollTop = $("chatBox").scrollHeight;
}

async function post(body) {
  const r = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  return r.json();
}

function getCode() {
  try { return (localStorage.getItem(LS_KEY) || "").trim(); } catch { return ""; }
}
function saveCode(c) {
  try { localStorage.setItem(LS_KEY, c); } catch {}
}
function clearCode() {
  try { localStorage.removeItem(LS_KEY); } catch {}
}

// ---- 進入（驗證通行碼：用一次輕量 chat 驗證太浪費，改為僅格式檢查+首次使用時後端把關）----
function enter(codeFromStorage) {
  const code = codeFromStorage || $("codeInput").value.trim().toUpperCase();
  const msg = $("gateMsg");
  if (!/^DREAM-[A-Z2-9]{5}$/.test(code)) {
    msg.style.display = "block";
    msg.classList.add("err");
    msg.textContent = "通行碼格式不對，應該像 DREAM-7K9Q2";
    return;
  }
  saveCode(code);
  $("gateCard").classList.add("hidden");
  $("mainArea").classList.remove("hidden");
  addMsg("嗨，我是 Luna 🌙 今晚想聊聊什麼夢呢？", "luna");
}

// ---- Luna 對話 ----
async function sendChat() {
  const input = $("chatInput");
  const text = input.value.trim();
  if (!text) return;
  const code = getCode();
  input.value = "";
  addMsg(text, "me");
  addMsg("…", "sys");

  const btn = $("sendBtn");
  btn.disabled = true;
  try {
    const d = await post({ action: "chat", code, message: text, history });
    // 移除 "…" 載入提示
    const box = $("chatBox");
    box.removeChild(box.lastChild);

    if (d.error) {
      addMsg("⚠️ " + d.error, "sys");
      if (/不存在|試用已結束/.test(d.error)) backToGate(d.error);
    } else {
      addMsg(d.reply, "luna");
      history.push({ role: "user", content: text });
      history.push({ role: "assistant", content: d.reply });
      if (history.length > 10) history = history.slice(-10); // 只留最近 5 輪
      showQuota(d.remaining);
    }
  } catch {
    const box = $("chatBox");
    box.removeChild(box.lastChild);
    addMsg("⚠️ 連線失敗，請稍後再試", "sys");
  }
  btn.disabled = false;
}

// ---- 深度解夢 ----
async function doDream() {
  const dream = $("dreamInput").value.trim();
  const out = $("dreamResult");
  if (!dream) {
    out.style.display = "block";
    out.classList.add("err");
    out.textContent = "先把夢寫下來吧";
    return;
  }
  const code = getCode();
  const btn = $("dreamBtn");
  btn.disabled = true;
  out.style.display = "block";
  out.classList.remove("err");
  out.textContent = "🔮 正在深度解讀你的夢…（約需 10–20 秒）";

  try {
    const d = await post({ action: "dream", code, dream });
    if (d.error) {
      out.classList.add("err");
      out.textContent = "⚠️ " + d.error;
      if (/不存在|試用已結束/.test(d.error)) backToGate(d.error);
    } else {
      out.textContent = d.reply;
      showQuota(d.remaining);
    }
  } catch {
    out.classList.add("err");
    out.textContent = "⚠️ 連線失敗，請稍後再試";
  }
  btn.disabled = false;
}

function backToGate(reason) {
  clearCode();
  setTimeout(() => {
    $("mainArea").classList.add("hidden");
    $("gateCard").classList.remove("hidden");
    const msg = $("gateMsg");
    msg.style.display = "block";
    msg.classList.add("err");
    msg.textContent = reason || "請重新輸入通行碼";
  }, 1500);
}

// ---- 綁事件 ----
$("enterBtn").addEventListener("click", () => enter());
$("sendBtn").addEventListener("click", sendChat);
$("chatInput").addEventListener("keydown", (e) => { if (e.key === "Enter") sendChat(); });
$("dreamBtn").addEventListener("click", doDream);
$("logoutBtn").addEventListener("click", () => {
  clearCode();
  history = [];
  $("chatBox").innerHTML = "";
  $("mainArea").classList.add("hidden");
  $("gateCard").classList.remove("hidden");
  $("gateMsg").style.display = "none";
  $("codeInput").value = "";
});

// ---- 自動登入（曾輸入過通行碼） ----
(function init() {
  const saved = getCode();
  if (saved) enter(saved);
})();
</script>
</body>
</html>
