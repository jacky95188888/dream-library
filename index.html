<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>夢境交友</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Serif TC',serif;background:#080412;color:#ede9fe;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.s{position:absolute;background:#fff;border-radius:50%;animation:tw 3s ease-in-out infinite;}
@keyframes tw{0%,100%{opacity:.15;}50%{opacity:1;}}
#lbg{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 50% at 50% 30%,rgba(124,58,237,.15) 0%,transparent 70%),linear-gradient(180deg,#1a0528 0%,#080412 100%);}
#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
.screen.on{display:flex;}
#loginScreen{align-items:center;justify-content:center;padding:24px;overflow-y:auto;}
.login-moon{font-size:64px;filter:drop-shadow(0 0 20px rgba(245,197,24,.6));animation:mf 4s ease-in-out infinite;margin-bottom:12px;display:block;text-align:center;}
@keyframes mf{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.login-title{font-size:28px;font-weight:700;background:linear-gradient(135deg,#e9d5ff,#c084fc 40%,#f5c518);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:6px;}
.login-sub{font-size:13px;color:#7c6fa0;text-align:center;line-height:1.6;margin-bottom:24px;}
.login-card{width:100%;background:rgba(20,10,45,.92);border:1px solid rgba(167,85,247,.25);border-radius:20px;padding:20px;backdrop-filter:blur(12px);}
.login-label{font-size:13px;color:#c4b5fd;margin-bottom:8px;display:block;}
.login-input{width:100%;background:rgba(255,255,255,.08)!important;border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 14px;color:#ffffff!important;-webkit-text-fill-color:#ffffff!important;font-family:'Noto Serif TC',serif;font-size:15px;outline:none;margin-bottom:14px;-webkit-box-shadow:0 0 0 30px rgba(30,15,60,.9) inset!important;box-shadow:0 0 0 30px rgba(30,15,60,.9) inset!important;}
.login-input::placeholder{color:#7c6fa0;}
.pt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.pt-item{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:11px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .2s;}
.pt-item.sel{border-color:#7c3aed;background:rgba(124,58,237,.25);}
.pt-ico{font-size:24px;margin-bottom:4px;}
.pt-lbl{font-size:11px;color:#c4b5fd;}
.pt-item.sel .pt-lbl{color:#c084fc;}
.enter-btn{width:100%;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:13px;color:#fff;-webkit-text-fill-color:#fff;font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;padding:15px;cursor:pointer;box-shadow:0 4px 18px rgba(124,58,237,.5);text-align:center;display:block;margin-top:4px;}
#mainScreen{flex-direction:column;}
.main-hdr{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(167,85,247,.25);flex-shrink:0;}
.user-info{display:flex;align-items:center;gap:8px;}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2d1560,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:16px;}
.user-name{font-size:14px;font-weight:600;}
.user-type{font-size:11px;color:#7c6fa0;}
.online-badge{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);border-radius:20px;padding:4px 10px;font-size:11px;color:#6ee7b7;display:flex;align-items:center;gap:5px;}
.online-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.tabs{display:flex;border-bottom:1px solid rgba(167,85,247,.25);flex-shrink:0;}
.tab{flex:1;padding:11px;text-align:center;font-size:12px;color:#7c6fa0;cursor:pointer;border-bottom:2px solid transparent;}
.tab.on{color:#a855f7;border-bottom-color:#a855f7;}
.tab-content{display:none;flex:1;overflow-y:auto;padding-bottom:120px;}
.tab-content.on{display:flex;flex-direction:column;}
.room-hdr{padding:10px 14px;background:rgba(124,58,237,.08);border-bottom:1px solid rgba(167,85,247,.2);flex-shrink:0;}
.room-title{font-size:14px;font-weight:700;margin-bottom:2px;}
.room-desc{font-size:11px;color:#7c6fa0;}
.messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.msg-item{display:flex;gap:9px;}
.msg-item.mine{flex-direction:row-reverse;}
.msg-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2d1560,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.msg-body{max-width:72%;}
.msg-nm{font-size:10px;color:#7c6fa0;margin-bottom:3px;}
.msg-item.mine .msg-nm{text-align:right;}
.msg-bbl{background:rgba(20,10,45,.92);border:1px solid rgba(167,85,247,.25);border-radius:14px;padding:9px 12px;font-size:13px;line-height:1.5;color:#ede9fe;}
.msg-item.mine .msg-bbl{background:rgba(124,58,237,.3);border-color:rgba(124,58,237,.5);}
.msg-time{font-size:10px;color:#7c6fa0;margin-top:3px;}
.msg-item.mine .msg-time{text-align:right;}
.sys-msg{text-align:center;font-size:11px;color:#7c6fa0;padding:4px 0;}
.msg-input-row{position:fixed;bottom:58px;left:0;right:0;padding:10px 14px;border-top:1px solid rgba(167,85,247,.2);display:flex;gap:8px;background:rgba(8,4,18,.98);z-index:40;backdrop-filter:blur(10px);}
.msg-input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:22px;padding:10px 14px;color:#ffffff;-webkit-text-fill-color:#ffffff;font-family:'Noto Serif TC',serif;font-size:14px;outline:none;}
.msg-input::placeholder{color:#7c6fa0;}
.send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;color:#fff;}
.browse-list{padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.user-card{background:rgba(20,10,45,.92);border:1px solid rgba(167,85,247,.25);border-radius:16px;padding:14px;display:flex;gap:12px;}
.uc-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#2d1560,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.uc-info{flex:1;min-width:0;}
.uc-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.uc-type{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.35);color:#c084fc;margin-bottom:8px;}
.uc-actions{display:flex;gap:7px;}
.uc-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;color:#c4b5fd;font-family:'Noto Serif TC',serif;font-size:12px;padding:7px 12px;cursor:pointer;}
.uc-btn.primary{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.4);color:#c084fc;}
.chat-list{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.chat-item{background:rgba(20,10,45,.92);border:1px solid rgba(167,85,247,.25);border-radius:14px;padding:12px;display:flex;gap:10px;align-items:center;cursor:pointer;}
.chat-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#2d1560,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.chat-info{flex:1;min-width:0;}
.chat-nm{font-size:14px;font-weight:600;margin-bottom:3px;}
.chat-prev{font-size:12px;color:#7c6fa0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty-state{text-align:center;padding:40px 20px;color:#7c6fa0;}
.empty-ico{font-size:40px;margin-bottom:10px;}
.empty-txt{font-size:13px;line-height:1.6;}
#chatScreen{flex-direction:column;}
.chat-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(167,85,247,.25);flex-shrink:0;}
.back-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#ede9fe;}
.chat-hdr-name{font-size:15px;font-weight:700;}
.chat-hdr-status{font-size:11px;color:#6ee7b7;}
.chat-hdr-info{flex:1;}
.share-btn{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.25);border-radius:20px;color:#fde68a;font-family:'Noto Serif TC',serif;font-size:12px;padding:6px 12px;cursor:pointer;}
.contact-panel{display:none;position:fixed;inset:0;z-index:300;}
.contact-panel.on{display:flex;flex-direction:column;}
.cp-back{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);}
.cp-sheet{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#1a0d35,#0f0820);border:1px solid rgba(167,85,247,.3);border-radius:22px 22px 0 0;padding:20px 20px 30px;animation:su .3s ease;}
@keyframes su{from{transform:translateY(100%);}to{transform:translateY(0);}}
.cp-handle{width:36px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:0 auto 18px;}
.cp-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:6px;}
.cp-sub{font-size:13px;color:#7c6fa0;text-align:center;margin-bottom:16px;line-height:1.5;}
.cp-warn{background:rgba(245,197,24,.08);border:1px solid rgba(245,197,24,.2);border-radius:10px;padding:10px 12px;font-size:12px;color:#fde68a;line-height:1.5;margin-bottom:14px;}
.cp-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 14px;color:#ffffff;-webkit-text-fill-color:#ffffff;font-family:'Noto Serif TC',serif;font-size:15px;outline:none;margin-bottom:12px;}
.cp-input::placeholder{color:#7c6fa0;}
.cp-btn{width:100%;background:linear-gradient(135deg,#f5c518,#f97316);border:none;border-radius:13px;color:#fff;font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;padding:14px;cursor:pointer;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,4,18,.97);border-top:1px solid rgba(167,85,247,.2);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-around;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:50;}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 12px;}
.ni.on .nico,.ni.on .nlbl{color:#a855f7;}
.nico{font-size:21px;color:#7c6fa0;}
.nlbl{font-size:10px;color:#7c6fa0;}
</style>
</head>
<body>
<div id="stars"></div>
<div id="lbg"></div>
<div id="app">

<div class="screen on" id="loginScreen">
  <span class="login-moon">🌙</span>
  <div class="login-title">夢境交友</div>
  <div class="login-sub">透過你的夢，找到靈魂頻率相近的人</div>
  <div class="login-card">
    <label class="login-label">你的暱稱</label>
    <input class="login-input" id="nickInput" placeholder="輸入你的暱稱（匿名）" maxlength="12">
    <label class="login-label">你的夢境人格</label>
    <div class="pt-grid">
      <div class="pt-item" onclick="selPT(this,'🌊 探索者')"><div class="pt-ico">🌊</div><div class="pt-lbl">探索者</div></div>
      <div class="pt-item" onclick="selPT(this,'🌙 浪漫者')"><div class="pt-ico">🌙</div><div class="pt-lbl">浪漫者</div></div>
      <div class="pt-item" onclick="selPT(this,'🔮 神秘者')"><div class="pt-ico">🔮</div><div class="pt-lbl">神秘者</div></div>
      <div class="pt-item" onclick="selPT(this,'🌟 守護者')"><div class="pt-ico">🌟</div><div class="pt-lbl">守護者</div></div>
      <div class="pt-item" onclick="selPT(this,'🦋 自由者')"><div class="pt-ico">🦋</div><div class="pt-lbl">自由者</div></div>
      <div class="pt-item" onclick="selPT(this,'🏛️ 智慧者')"><div class="pt-ico">🏛️</div><div class="pt-lbl">智慧者</div></div>
    </div>
    <div class="enter-btn" onclick="enterApp()">✦ 進入夢境交友</div>
  </div>
</div>

<div class="screen" id="mainScreen">
  <div class="main-hdr">
    <div class="user-info">
      <div class="user-avatar" id="myAvatar">🌙</div>
      <div><div class="user-name" id="myName">-</div><div class="user-type" id="myType">-</div></div>
    </div>
    <div class="online-badge"><div class="online-dot"></div><span id="onlineCount">1</span> 人在線</div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="switchTab('public')">💬 討論室</div>
    <div class="tab" onclick="switchTab('browse')">🔍 瀏覽</div>
    <div class="tab" onclick="switchTab('private')">💌 私聊</div>
  </div>
  <div class="tab-content on" id="tabPublic">
    <div class="room-hdr"><div class="room-title">🌙 夢境共鳴廣場</div><div class="room-desc">分享你的夢，與陌生靈魂共鳴</div></div>
    <div class="messages" id="publicMessages"></div>
    <div class="msg-input-row" id="pubRow">
      <input class="msg-input" id="publicInput" placeholder="分享你的夢境或想法...">
      <button class="send-btn" onclick="sendPublic()">➤</button>
    </div>
  </div>
  <div class="tab-content" id="tabBrowse">
    <div class="browse-list" id="browseList"><div class="empty-state"><div class="empty-ico">🔍</div><div class="empty-txt">正在尋找靈魂頻率相近的人...</div></div></div>
  </div>
  <div class="tab-content" id="tabPrivate">
    <div class="chat-list" id="chatList"><div class="empty-state"><div class="empty-ico">💌</div><div class="empty-txt">還沒有私聊<br>在「瀏覽」送出共鳴開始對話</div></div></div>
  </div>
</div>

<div class="screen" id="chatScreen">
  <div class="chat-hdr">
    <div class="back-btn" onclick="backToMain()">←</div>
    <div class="user-avatar" id="chatAvatar" style="width:36px;height:36px;font-size:18px;">🌙</div>
    <div class="chat-hdr-info"><div class="chat-hdr-name" id="chatName">-</div><div class="chat-hdr-status">在線中</div></div>
    <button class="share-btn" onclick="openCP()">📱 交換聯絡</button>
  </div>
  <div class="messages" id="privateMessages" style="padding-bottom:80px;"></div>
  <div class="msg-input-row">
    <input class="msg-input" id="privateInput" placeholder="輸入訊息..." onkeydown="if(event.key==='Enter')sendPrivate()">
    <button class="send-btn" onclick="sendPrivate()">➤</button>
  </div>
</div>

</div>

<div class="bnav" id="bnav" style="display:none;">
  <div class="ni on" id="ni0" onclick="switchTab('public')"><div class="nico">💬</div><div class="nlbl">討論室</div></div>
  <div class="ni" id="ni1" onclick="switchTab('browse')"><div class="nico">🔍</div><div class="nlbl">瀏覽</div></div>
  <div class="ni" id="ni2" onclick="switchTab('private')"><div class="nico">💌</div><div class="nlbl">私聊</div></div>
</div>

<div class="contact-panel" id="contactPanel">
  <div class="cp-back" onclick="closeCP()"></div>
  <div class="cp-sheet">
    <div class="cp-handle"></div>
    <div class="cp-title">📱 交換聯絡方式</div>
    <div class="cp-sub">分享你的聯絡方式給對方</div>
    <div class="cp-warn">⚠️ 請謹慎分享，只與信任的人交換</div>
    <input class="cp-input" id="contactInput" placeholder="輸入 Line ID 或其他聯絡方式">
    <button class="cp-btn" onclick="sendContact()">✦ 送出</button>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInAnonymously}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getDatabase,ref,push,onValue,set,update,serverTimestamp,query,orderByChild,limitToLast}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={apiKey:"AIzaSyBCB1mNOALciOrtM2l3ev7oLUrRS8jXrds",authDomain:"dream-library-44465.firebaseapp.com",databaseURL:"https://dream-library-44465-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"dream-library-44465",storageBucket:"dream-library-44465.firebasestorage.app",messagingSenderId:"455603446756",appId:"1:455603446756:web:5dbaf31740bc714c711df1"};
const app=initializeApp(cfg);
const auth=getAuth(app);
const db=getDatabase(app);
let myUid=null,myNick='',myType='',chatUid=null,chatNick='';
const em={'🌊 探索者':'🌊','🌙 浪漫者':'🌙','🔮 神秘者':'🔮','🌟 守護者':'🌟','🦋 自由者':'🦋','🏛️ 智慧者':'🏛️'};
const se=document.getElementById('stars');
for(let i=0;i<60;i++){const s=document.createElement('div');s.className='s';s.style.cssText=`width:${Math.random()*2+.3}px;height:${Math.random()*2+.3}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${Math.random()*3+2}s;animation-delay:${Math.random()*4}s;`;se.appendChild(s);}
window.selPT=function(el,t){document.querySelectorAll('.pt-item').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');window._pt=t;};
window.enterApp=async function(){
  const nick=document.getElementById('nickInput').value.trim();
  const type=window._pt;
  if(!nick){alert('請輸入暱稱');return;}
  if(!type){alert('請選擇夢境人格');return;}
  myNick=nick;myType=type;
  try{
    const c=await signInAnonymously(auth);myUid=c.user.uid;
    await set(ref(db,'users/'+myUid),{nick,type,emoji:em[type]||'🌙',online:true,ts:serverTimestamp()});
    window.addEventListener('beforeunload',()=>update(ref(db,'users/'+myUid),{online:false}));
    document.getElementById('myName').textContent=nick;
    document.getElementById('myType').textContent=type;
    document.getElementById('myAvatar').textContent=em[type]||'🌙';
    document.getElementById('loginScreen').classList.remove('on');
    document.getElementById('mainScreen').classList.add('on');
    document.getElementById('bnav').style.display='flex';
    loadPub();loadUsers();loadChatList();trackOnline();
    setTimeout(()=>push(ref(db,'publicMessages'),{type:'system',text:nick+' 加入了夢境廣場 ✨',ts:Date.now()}),600);
  }catch(e){alert('連線失敗：'+e.message);}
};
function trackOnline(){onValue(ref(db,'users'),snap=>{let n=0;if(snap.exists())snap.forEach(c=>{if(c.val().online)n++;});document.getElementById('onlineCount').textContent=n;});}
function loadPub(){
  onValue(query(ref(db,'publicMessages'),orderByChild('ts'),limitToLast(50)),snap=>{
    const el=document.getElementById('publicMessages');el.innerHTML='';
    if(!snap.exists()){el.innerHTML='<div class="sys-msg">歡迎來到夢境廣場 🌙</div>';return;}
    snap.forEach(c=>renderPub(c.val()));el.scrollTop=el.scrollHeight;
  });
}
function renderPub(m){
  const el=document.getElementById('publicMessages');
  if(m.type==='system'){const d=document.createElement('div');d.className='sys-msg';d.textContent=m.text;el.appendChild(d);return;}
  const me=m.uid===myUid;const d=document.createElement('div');d.className='msg-item'+(me?' mine':'');
  const t=m.ts?new Date(m.ts).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}):'';
  d.innerHTML=`<div class="msg-av">${m.emoji||'🌙'}</div><div class="msg-body"><div class="msg-nm">${me?'我':esc(m.nick)} · ${m.type_label||''}</div><div class="msg-bbl">${esc(m.text)}</div><div class="msg-time">${t}</div></div>`;
  el.appendChild(d);
}
window.sendPublic=function(){const inp=document.getElementById('publicInput');const txt=inp.value.trim();if(!txt||!myUid)return;push(ref(db,'publicMessages'),{uid:myUid,nick:myNick,emoji:em[myType]||'🌙',type_label:myType,text:txt,ts:Date.now()});inp.value='';};
function loadUsers(){
  onValue(ref(db,'users'),snap=>{
    const el=document.getElementById('browseList');el.innerHTML='';
    if(!snap.exists()){el.innerHTML='<div class="empty-state"><div class="empty-ico">🔍</div><div class="empty-txt">還沒有其他用戶</div></div>';return;}
    let n=0;
    snap.forEach(c=>{const u=c.val();const uid=c.key;if(uid===myUid)return;n++;
      const d=document.createElement('div');d.className='user-card';
      d.innerHTML=`<div class="uc-av">${u.emoji||'🌙'}</div><div class="uc-info"><div class="uc-name">${esc(u.nick)}${u.online?' <span style="color:#6ee7b7;font-size:10px;">● 在線</span>':''}</div><div class="uc-type">${u.type||''}</div><div class="uc-actions"><button class="uc-btn primary" onclick="sendRes('${uid}','${escA(u.nick)}','${u.emoji||'🌙'}')">💜 共鳴</button><button class="uc-btn" onclick="openChat('${uid}','${escA(u.nick)}','${u.emoji||'🌙'}')">💬 私聊</button></div></div>`;
      el.appendChild(d);});
    if(!n)el.innerHTML='<div class="empty-state"><div class="empty-ico">🔍</div><div class="empty-txt">目前只有你在線<br>邀請朋友一起來！</div></div>';
  });
}
window.sendRes=function(uid,nick,emoji){push(ref(db,'publicMessages'),{uid:myUid,nick:myNick,emoji:em[myType]||'🌙',type_label:myType,text:'對 '+nick+' 送出了💜共鳴',ts:Date.now()});openChat(uid,nick,emoji);};
window.openChat=function(uid,nick,emoji){chatUid=uid;chatNick=nick;document.getElementById('chatName').textContent=nick;document.getElementById('chatAvatar').textContent=emoji;document.getElementById('mainScreen').classList.remove('on');document.getElementById('bnav').style.display='none';document.getElementById('chatScreen').classList.add('on');loadPriv(uid);};
window.backToMain=function(){document.getElementById('chatScreen').classList.remove('on');document.getElementById('mainScreen').classList.add('on');document.getElementById('bnav').style.display='flex';chatUid=null;};
function cid(a,b){return[a,b].sort().join('_');}
function loadPriv(uid){
  onValue(query(ref(db,'chats/'+cid(myUid,uid)+'/messages'),orderByChild('ts'),limitToLast(100)),snap=>{
    const el=document.getElementById('privateMessages');el.innerHTML='';
    if(!snap.exists()){el.innerHTML='<div class="sys-msg">與 '+chatNick+' 的對話開始了 🌙</div>';return;}
    snap.forEach(c=>renderPriv(c.val()));el.scrollTop=el.scrollHeight;
  });
}
function renderPriv(m){
  const el=document.getElementById('privateMessages');
  if(m.type==='system'){const d=document.createElement('div');d.className='sys-msg';d.textContent=m.text;el.appendChild(d);return;}
  if(m.type==='contact'){const d=document.createElement('div');d.className='sys-msg';d.innerHTML='📱 '+esc(m.nick)+' 的聯絡方式：<strong style="color:#fde68a">'+esc(m.contact)+'</strong>';el.appendChild(d);return;}
  const me=m.uid===myUid;const d=document.createElement('div');d.className='msg-item'+(me?' mine':'');
  const t=m.ts?new Date(m.ts).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}):'';
  d.innerHTML=`<div class="msg-av">${m.emoji||'🌙'}</div><div class="msg-body"><div class="msg-nm">${me?'我':esc(m.nick)}</div><div class="msg-bbl">${esc(m.text)}</div><div class="msg-time">${t}</div></div>`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
window.sendPrivate=function(){const inp=document.getElementById('privateInput');const txt=inp.value.trim();if(!txt||!myUid||!chatUid)return;const id=cid(myUid,chatUid);push(ref(db,'chats/'+id+'/messages'),{uid:myUid,nick:myNick,emoji:em[myType]||'🌙',text:txt,ts:Date.now()});set(ref(db,'userChats/'+myUid+'/'+chatUid),{nick:chatNick,lastMsg:txt,ts:Date.now()});set(ref(db,'userChats/'+chatUid+'/'+myUid),{nick:myNick,emoji:em[myType]||'🌙',lastMsg:txt,ts:Date.now(),unread:true});inp.value='';};
function loadChatList(){
  onValue(ref(db,'userChats/'+myUid),snap=>{
    const el=document.getElementById('chatList');el.innerHTML='';
    if(!snap.exists()){el.innerHTML='<div class="empty-state"><div class="empty-ico">💌</div><div class="empty-txt">還沒有私聊<br>在「瀏覽」送出共鳴開始對話</div></div>';return;}
    snap.forEach(c=>{const v=c.val();const uid=c.key;const d=document.createElement('div');d.className='chat-item';d.onclick=()=>openChat(uid,v.nick,v.emoji||'🌙');d.innerHTML=`<div class="chat-av">${v.emoji||'🌙'}</div><div class="chat-info"><div class="chat-nm">${esc(v.nick)}</div><div class="chat-prev">${esc(v.lastMsg||'開始聊天吧...')}</div></div>`;el.appendChild(d);});
  });
}
window.openCP=function(){document.getElementById('contactPanel').classList.add('on');};
window.closeCP=function(){document.getElementById('contactPanel').classList.remove('on');};
window.sendContact=function(){const c=document.getElementById('contactInput').value.trim();if(!c||!chatUid)return;push(ref(db,'chats/'+cid(myUid,chatUid)+'/messages'),{type:'contact',uid:myUid,nick:myNick,contact:c,ts:Date.now()});closeCP();alert('聯絡方式已分享 💜');};
window.switchTab=function(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('on'));
  ['ni0','ni1','ni2'].forEach(id=>document.getElementById(id).classList.remove('on'));
  const idx={public:0,browse:1,private:2}[tab];
  document.querySelectorAll('.tab')[idx].classList.add('on');
  document.getElementById('ni'+idx).classList.add('on');
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('on');
  document.getElementById('pubRow').style.display=tab==='public'?'flex':'none';
};
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escA(s){return String(s).replace(/'/g,"\\'");}
document.getElementById('publicInput').addEventListener('keydown',e=>{if(e.key==='Enter')window.sendPublic();});
</script>

</body>
</html>
